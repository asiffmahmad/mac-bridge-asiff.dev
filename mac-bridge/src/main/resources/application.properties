server.port=8080
server.address=0.0.0.0
spring.application.name=mac-bridge

# JWT
bridge.jwt.expiration=86400000
bridge.jwt.refresh-expiration=604800000
bridge.jwt.key-file=${user.home}/.mac-bridge/jwt.key

# Users
bridge.users.file=${user.home}/.mac-bridge/users.json

# Pairing
bridge.pairing.enabled=true
bridge.pairing.code-ttl-seconds=300
bridge.devices.file=${user.home}/.mac-bridge/devices.json

# Terminal
bridge.terminal.mode=SAFE

# Rate limiting
bridge.rate-limit.auth-rpm=60
bridge.rate-limit.api-rpm=300

# Bridge metadata
bridge.version=1.0.0
